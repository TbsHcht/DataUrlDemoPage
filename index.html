  <title>Data URL Demo – PDF Download</title>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;

      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    p {
      color: #4a5568;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #4f46e5;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover { background: #4338ca; }
    .btn:active { transform: scale(0.97); }

    .meta {
      margin-top: 28px;
      font-size: 0.8rem;
      color: #a0aec0;
    }

    code {
      background: #edf2f7;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
